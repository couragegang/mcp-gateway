micronaut:
  application:
    name: mcp-gateway
  server:
    port: 8081
    context-path: /v1/mcp
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true
    binders:
      web:
        enabled: true
        server:
          percentiles: [0.5, 0.95, 0.99]
          histogram: true

endpoints:
  health:
    enabled: true
    sensitive: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    sensitive: false
    path: metrics

mcp:
  notion:
    enabled: ${MCP_NOTION_ENABLED:false}
    integration-token: ${NOTION_INTEGRATION_TOKEN:}
