micronaut:
  application:
    name: mcp-gateway
  server:
    port: 8081
    context-path: /v1/mcp
  metrics:
    enabled: true
    export:
      prometheus:
        enabled: true

endpoints:
  health:
    enabled: true
    sensitive: false
  metrics:
    enabled: false
  prometheus:
    enabled: true
    sensitive: false
    path: metrics

datasources:
  default:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mcp}
    username: ${DB_USER:mcp}
    password: ${DB_PASSWORD:mcp}
    driver-class-name: org.postgresql.Driver

flyway:
  datasources:
    default:
      enabled: true

mcp:
  policy-service:
    enabled: ${POLICY_SERVICE_ENABLED:true}
    base-url: ${POLICY_SERVICE_URL:http://localhost:8085/v1/policy}
    internal-api-key: ${POLICY_INTERNAL_API_KEY:dev-internal-key}
  secrets-service:
    enabled: ${SECRETS_SERVICE_ENABLED:true}
    base-url: ${SECRETS_SERVICE_URL:http://localhost:8087/v1/secrets}
    internal-api-key: ${SECRETS_INTERNAL_API_KEY:dev-internal-key}
  audit-service:
    enabled: ${AUDIT_SERVICE_ENABLED:true}
    base-url: ${AUDIT_SERVICE_URL:http://localhost:8086/v1/audit}
    internal-api-key: ${AUDIT_INTERNAL_API_KEY:dev-internal-key}
